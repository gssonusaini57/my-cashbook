<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Cash Book</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 400px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #1a73e8; color: white; padding: 25px; text-align: center; }
        .balance-title { font-size: 14px; opacity: 0.9; }
        .balance-amount { font-size: 32px; font-weight: bold; margin-top: 5px; }
        
        .form-section { padding: 20px; border-bottom: 8px solid #f0f2f5; }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-save:disabled { background: #ccc; }

        .history-section { padding: 20px; }
        .history-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; color: #333; }
        .refresh-btn { background: #1a73e8; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        
        .log-container { max-height: 300px; overflow-y: auto; }
        .entry-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; align-items: center; }
        .entry-info { display: flex; flex-direction: column; }
        .entry-remark { font-weight: 600; color: #2c3e50; }
        .entry-date { font-size: 11px; color: #7f8c8d; }
        .amt-in { color: #2ecc71; font-weight: bold; }
        .amt-out { color: #e74c3c; font-weight: bold; }
        #loading { text-align: center; color: #666; font-size: 14px; padding: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="balance-title">Current Balance</div>
        <div class="balance-amount">₹<span id="totalDisplay">0</span></div>
    </div>

    <div class="form-section">
        <form id="cashForm">
            <input type="number" id="amt" placeholder="Amount (₹)" required>
            <input type="text" id="note" placeholder="Kihnu ditte/Kithon aaye?" required>
            <select id="mode">
                <option value="IN">Cash IN (+)</option>
                <option value="OUT">Cash OUT (-)</option>
            </select>
            <button type="submit" id="submitBtn" class="btn-save">Save Entry</button>
        </form>
    </div>

    <div class="history-section">
        <div class="history-title">
            <b>Recent History</b>
            <button class="refresh-btn" onclick="fetchHistory()">Refresh</button>
        </div>
        <div id="loading" style="display:none;">Loading...</div>
        <div id="historyLog" class="log-container">
            </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyrcmwdyhzj4DHLdbMNU3ZXX8Z-wmoqXPxrvM9E3J9YZlSGWycuMCKqIyueRfh9P-gV/exec';

    // 1. Data load karan da function
    async function fetchHistory() {
        const log = document.getElementById('historyLog');
        const totalDisp = document.getElementById('totalDisplay');
        const loader = document.getElementById('loading');
        
        loader.style.display = "block";
        log.innerHTML = "";

        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            
            let total = 0;
            let html = "";

            data.reverse().forEach(item => {
                const val = parseFloat(item.amount);
                const isIN = item.type === 'IN';
                total += isIN ? val : -val;

                html += `
                    <div class="entry-item">
                        <div class="entry-info">
                            <span class="entry-remark">${item.remark}</span>
                            <span class="entry-date">${new Date(item.date).toLocaleDateString()}</span>
                        </div>
                        <div class="${isIN ? 'amt-in' : 'amt-out'}">
                            ${isIN ? '+' : '-'} ₹${val}
                        </div>
                    </div>`;
            });

            totalDisp.innerText = total.toLocaleString('en-IN');
            log.innerHTML = html || "<p style='text-align:center; color:#999;'>No history found</p>";
        } catch (err) {
            log.innerHTML = "<p style='color:red; text-align:center;'>Error loading data!</p>";
        } finally {
            loader.style.display = "none";
        }
    }

    // 2. Data save karan da function
    document.getElementById('cashForm').addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Saving...";

        const payload = {
            amount: document.getElementById('amt').value,
            remark: document.getElementById('note').value,
            type: document.getElementById('mode').value
        };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        })
        .then(() => {
            document.getElementById('cashForm').reset();
            btn.disabled = false;
            btn.innerText = "Save Entry";
            fetchHistory(); // Turant update karo
        })
        .catch(() => {
            alert("Error saving data!");
            btn.disabled = false;
            btn.innerText = "Try Again";
        });
    });

    // Page khulde hi data load karo
    fetchHistory();
</script>

</body>
</html>
