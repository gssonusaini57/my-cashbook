<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Book Pro - Filter & PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #1a73e8; color: white; padding: 20px; text-align: center; }
        .balance-amount { font-size: 30px; font-weight: bold; }
        
        .form-section { padding: 15px; border-bottom: 5px solid #f4f7f6; }
        input, select { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; color: white; }
        .btn-in { background: #28a745; }
        .btn-out { background: #dc3545; }
        .btn-update { background: #f39c12; width: 100%; display: none; margin-top: 5px; }

        .filter-section { padding: 10px 15px; background: #eef2f3; display: flex; justify-content: space-between; align-items: center; }
        .btn-pdf { background: #17a2b8; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }

        .history-section { padding: 15px; max-height: 400px; overflow-y: auto; }
        .entry-item { background: white; padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .actions { font-size: 11px; margin-top: 5px; color: #1a73e8; }
        .del-btn { color: #dc3545; margin-left: 10px; cursor: pointer; }
        .amt-in { color: #28a745; font-weight: bold; }
        .amt-out { color: #dc3545; font-weight: bold; }
        #status { text-align: center; font-size: 12px; color: #666; padding: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div style="font-size: 13px;">Total Balance</div>
        <div class="balance-amount">₹<span id="totalDisplay">0</span></div>
    </div>

    <div class="form-section">
        <input type="hidden" id="editRow">
        <input type="hidden" id="editType">
        <input type="number" id="amt" placeholder="Amount (₹)">
        <input type="text" id="note" placeholder="Details (Kihnu/Kithon?)">
        
        <div id="normalButtons" class="btn-group">
            <button onclick="saveData('IN')" id="btnIn" class="btn btn-in">IN (+)</button>
            <button onclick="saveData('OUT')" id="btnOut" class="btn btn-out">OUT (-)</button>
        </div>
        <button id="updateBtn" onclick="updateData()" class="btn btn-update">Update Entry</button>
        <div id="status">Ready</div>
    </div>

    <div class="filter-section">
        <select id="monthFilter" style="width: 60%; margin:0;" onchange="renderHistory()">
            <option value="all">All Months (Sara Data)</option>
            <option value="0">January</option><option value="1">February</option>
            <option value="2">March</option><option value="3">April</option>
            <option value="4">May</option><option value="5">June</option>
            <option value="6">July</option><option value="7">August</option>
            <option value="8">September</option><option value="9">October</option>
            <option value="10">November</option><option value="11">December</option>
        </select>
        <button class="btn-pdf" onclick="downloadPDF()">Download PDF</button>
    </div>

    <div class="history-section" id="historyLog">Loading...</div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzHeZ6tSiFhDzVnmjkoumkuBH1Z8h4VdAVwT2IVm6c64rgnIYseWS1KrRuXPJpgOSKx/exec';
    let fullData = [];

    async function fetchHistory() {
        try {
            const response = await fetch(scriptURL);
            fullData = await response.json();
            renderHistory();
        } catch (err) { document.getElementById('status').innerText = "Error loading data!"; }
    }

    function renderHistory() {
        const log = document.getElementById('historyLog');
        const selectedMonth = document.getElementById('monthFilter').value;
        let total = 0, html = "";

        const filtered = fullData.filter(item => {
            if (selectedMonth === "all") return true;
            return new Date(item.date).getMonth() == selectedMonth;
        });

        filtered.reverse().forEach(item => {
            const isIN = item.type === 'IN';
            total += isIN ? item.amount : -item.amount;
            html += `
                <div class="entry-item">
                    <div>
                        <span style="font-weight:600">${item.remark}</span><br>
                        <small style="color:#888">${new Date(item.date).toLocaleDateString('en-IN')}</small>
                        <div class="actions">
                            <span onclick="startEdit(${item.row},'${item.remark}',${item.amount},'${item.type}')" style="cursor:pointer">Edit</span>
                            <span class="del-btn" onclick="deleteEntry(${item.row})">Delete</span>
                        </div>
                    </div>
                    <div class="${isIN ? 'amt-in' : 'amt-out'}">${isIN ? '+' : '-'} ₹${item.amount}</div>
                </div>`;
        });
        document.getElementById('totalDisplay').innerText = total.toLocaleString('en-IN');
        log.innerHTML = html || "<p style='text-align:center; padding:20px; color:#999;'>No data for this month</p>";
    }

    async function saveData(type) {
        const payload = { amount: document.getElementById('amt').value, remark: document.getElementById('note').value, type: type };
        document.getElementById('status').innerText = "Saving...";
        await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        resetForm();
    }

    async function deleteEntry(row) {
        if(!confirm("Ki tusi delete karna chaunde ho?")) return;
        document.getElementById('status').innerText = "Deleting...";
        await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action: "delete", row: row}) });
        fetchHistory();
    }

    function startEdit(row, remark, amt, type) {
        document.getElementById('editRow').value = row;
        document.getElementById('editType').value = type;
        document.getElementById('amt').value = amt;
        document.getElementById('note').value = remark;
        document.getElementById('normalButtons').style.display = "none";
        document.getElementById('updateBtn').style.display = "block";
        window.scrollTo(0,0);
    }

    async function updateData() {
        const payload = { action: "update", row: document.getElementById('editRow').value, amount: document.getElementById('amt').value, remark: document.getElementById('note').value, type: document.getElementById('editType').value };
        document.getElementById('status').innerText = "Updating...";
        await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        resetForm();
    }

    function resetForm() {
        document.getElementById('amt').value = ""; document.getElementById('note').value = "";
        document.getElementById('normalButtons').style.display = "flex";
        document.getElementById('updateBtn').style.display = "none";
        document.getElementById('status').innerText = "Ready";
        fetchHistory();
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Daily Cash Book Report", 14, 15);
        
        const rows = fullData.map(item => [
            new Date(item.date).toLocaleDateString('en-IN'),
            item.remark,
            item.type,
            "Rs. " + item.amount
        ]);

        doc.autoTable({
            head: [['Date', 'Description', 'Type', 'Amount']],
            body: rows,
            startY: 20
        });
        doc.save("CashBook_Report.pdf");
    }

    fetchHistory();
</script>
</body>
</html>
