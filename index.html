<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Cash Book</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 400px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); overflow: hidden; }
        .header { background: #1a73e8; color: white; padding: 25px; text-align: center; }
        .balance-amount { font-size: 34px; font-weight: bold; margin-top: 5px; }
        
        .form-section { padding: 20px; background: #fff; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #1a73e8; }
        
        .button-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-in { background: #28a745; }
        .btn-in:active { background: #1e7e34; transform: scale(0.96); }
        .btn-out { background: #dc3545; }
        .btn-out:active { background: #bd2130; transform: scale(0.96); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        .history-section { padding: 20px; background: #fafafa; min-height: 200px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .refresh-link { color: #1a73e8; font-size: 13px; cursor: pointer; text-decoration: underline; }
        
        .entry-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; background: white; margin-bottom: 5px; border-radius: 8px; }
        .entry-info { display: flex; flex-direction: column; }
        .remark { font-weight: 600; color: #333; }
        .date { font-size: 11px; color: #888; }
        .amt-in { color: #28a745; font-weight: bold; }
        .amt-out { color: #dc3545; font-weight: bold; }
        #statusMsg { text-align: center; font-size: 12px; margin-top: 10px; color: #666; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div style="font-size: 14px; opacity: 0.9;">Total Balance</div>
        <div class="balance-amount">₹<span id="totalDisplay">0</span></div>
    </div>

    <div class="form-section">
        <input type="number" id="amt" placeholder="Amount (₹)" required>
        <input type="text" id="note" placeholder="Vivar (Kihnu/Kithon?)" required>
        
        <div class="button-group">
            <button onclick="sendData('IN')" id="btnIn" class="btn btn-in">CASH IN (+)</button>
            <button onclick="sendData('OUT')" id="btnOut" class="btn btn-out">CASH OUT (-)</button>
        </div>
        <div id="statusMsg">Data load ho reha hai...</div>
    </div>

    <div class="history-section">
        <div class="history-header">
            <b style="color:#555">Recent Transactions</b>
            <span class="refresh-link" onclick="fetchHistory()">Refresh</span>
        </div>
        <div id="historyLog">
            </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyrcmwdyhzj4DHLdbMNU3ZXX8Z-wmoqXPxrvM9E3J9YZlSGWycuMCKqIyueRfh9P-gV/exec';

    // 1. Data Fetch Karan Layi
    async function fetchHistory() {
        const log = document.getElementById('historyLog');
        const totalDisp = document.getElementById('totalDisplay');
        const status = document.getElementById('statusMsg');
        
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            
            let total = 0;
            let html = "";

            data.reverse().forEach(item => {
                const val = parseFloat(item.amount);
                const isIN = item.type === 'IN';
                total += isIN ? val : -val;

                html += `
                    <div class="entry-item">
                        <div class="entry-info">
                            <span class="remark">${item.remark}</span>
                            <span class="date">${new Date(item.date).toLocaleDateString('en-IN')}</span>
                        </div>
                        <div class="${isIN ? 'amt-in' : 'amt-out'}">
                            ${isIN ? '+' : '-'} ₹${val}
                        </div>
                    </div>`;
            });

            totalDisp.innerText = total.toLocaleString('en-IN');
            log.innerHTML = html || "<p style='text-align:center; color:#999;'>No history yet</p>";
            status.innerText = "Ready";
        } catch (err) {
            status.innerText = "Error loading history!";
        }
    }

    // 2. Data Send Karan Layi
    async function sendData(type) {
        const amtInput = document.getElementById('amt');
        const noteInput = document.getElementById('note');
        const status = document.getElementById('statusMsg');
        const btnIn = document.getElementById('btnIn');
        const btnOut = document.getElementById('btnOut');

        if(!amtInput.value || !noteInput.value) {
            alert("Please Amount te Detail bharo!");
            return;
        }

        const payload = {
            amount: amtInput.value,
            remark: noteInput.value,
            type: type
        };

        // Buttons disable karo
        btnIn.disabled = true;
        btnOut.disabled = true;
        status.innerText = "Saving to Google Sheets...";

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            
            amtInput.value = "";
            noteInput.value = "";
            status.innerText = "Saved Successfully!";
            fetchHistory(); // List update karo
        } catch (e) {
            alert("Error saving!");
        } finally {
            btnIn.disabled = false;
            btnOut.disabled = false;
        }
    }

    // Start te data load karo
    fetchHistory();
</script>

</body>
</html>
