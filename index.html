<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Book Online</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        .box { background: white; padding: 20px; border-radius: 10px; max-width: 350px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #1a73e8; color: white; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Cash Book Online</h2>
        <form id="cashForm">
            <input type="number" id="amount" placeholder="Amount (₹)" required>
            <input type="text" id="remark" placeholder="Vivar (Details)" required>
            <select id="type">
                <option value="IN">Cash IN (+)</option>
                <option value="OUT">Cash OUT (-)</option>
            </select>
            <button type="submit" id="btn">Save to Sheet</button>
        </form>
        <p id="msg"></p>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzu-NzmTuzUE6ApvfP6lDr71W1eHdEAD1bnyJ7AtZfyBG1H6G4E2L3tJKuHcQlOhNxb/exec';
        const form = document.getElementById('cashForm');
        
        form.addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('btn').innerText = "Saving...";
            
            const data = {
                amount: document.getElementById('amount').value,
                remark: document.getElementById('remark').value,
                type: document.getElementById('type').value
            };

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            })
            .then(() => {
                document.getElementById('msg').innerText = "✅ Saved Successfully!";
                form.reset();
                document.getElementById('btn').innerText = "Save to Sheet";
            })
            .catch(() => {
                alert("Error!");
                document.getElementById('btn').innerText = "Try Again";
            });
        });
    </script>
</body>
</html>
