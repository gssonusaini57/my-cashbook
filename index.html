<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Cash Book - Saini Trading Default</title>
    <style>
        :root { --primary: #1a237e; --secondary: #283593; --success: #2e7d32; --danger: #c62828; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* Business Tabs */
        .account-tabs { display: flex; background: #eee; border-bottom: 2px solid #ddd; overflow-x: auto; }
        .tab { flex: 1; padding: 12px 5px; text-align: center; font-weight: bold; color: #666; font-size: 11px; white-space: nowrap; border-right: 1px solid #ddd; cursor: pointer; transition: 0.3s; }
        .tab.active { background: var(--primary); color: white; border-bottom: 4px solid #ffca28; }

        .header { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; padding: 20px; text-align: center; }
        .balance-amount { font-size: 28px; font-weight: bold; margin-top: 5px; }
        
        .form-section { padding: 15px; border-bottom: 8px solid var(--bg); }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1.5px solid #d1d9e6; border-radius: 10px; font-size: 15px; box-sizing: border-box; outline: none; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; color: white; }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--danger); }
        .btn-update { background: #f39c12; width: 100%; display: none; margin-top: 10px; }

        .history-section { padding: 15px; background: #fff; min-height: 200px; }
        .entry-item { background: #fff; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .remark { font-weight: 600; color: #333; font-size: 14px; }
        .date-time { font-size: 10px; color: #888; margin-top: 3px; }
        .actions { font-size: 12px; margin-top: 8px; display: flex; gap: 12px; }
        .amt-in { color: var(--success); font-weight: bold; font-size: 16px; }
        .amt-out { color: var(--danger); font-weight: bold; font-size: 16px; }
        #status { text-align: center; font-size: 12px; color: #555; font-weight: bold; padding: 8px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="account-tabs">
        <div id="tab1" class="tab" onclick="switchAccount('Khalsa_School', 'Khalsa International School')">Khalsa School</div>
        <div id="tab2" class="tab active" onclick="switchAccount('Saini_Trading', 'Saini Trading Company')">Saini Trading</div>
        <div id="tab3" class="tab" onclick="switchAccount('Krishna_Rice', 'Krishna Rice Mills')">Krishna Rice</div>
    </div>

    <div class="header">
        <div id="accTitle" style="font-size: 12px; opacity: 0.9; margin-bottom:5px;">Saini Trading Company</div>
        <div style="font-size: 11px; opacity: 0.8;">CURRENT BALANCE</div>
        <div class="balance-amount">₹<span id="totalDisplay">0</span></div>
    </div>

    <div class="form-section">
        <input type="hidden" id="editRow">
        <input type="number" id="amt" placeholder="Amount (₹)">
        <input type="text" id="note" placeholder="Details (Vivar)">
        
        <div id="normalButtons" class="btn-group">
            <button onclick="saveData('IN')" id="btnIn" class="btn btn-in">CASH IN (+)</button>
            <button onclick="saveData('OUT')" id="btnOut" class="btn btn-out">CASH OUT (-)</button>
        </div>
        <button id="updateBtn" onclick="updateData()" class="btn btn-update">Update Entry</button>
        <div id="status">Ready</div>
    </div>

    <div class="history-section" id="historyLog">Loading...</div>
</div>

<script>
    // ⚠️ APNA SCRIPT URL ITHE PAO
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwGEuZp73ahYOy5tWphRMKPSLoufrWllDEBOuBKp0RUXXfzT4Xfh--HfUiNZ4bR2fWL/exec';
    
    // Default Account Saini Trading Set Kita Hai
    let currentAcc = 'Saini_Trading';

    async function switchAccount(id, fullName) {
        currentAcc = id;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(id === 'Khalsa_School') document.getElementById('tab1').classList.add('active');
        if(id === 'Saini_Trading') document.getElementById('tab2').classList.add('active');
        if(id === 'Krishna_Rice') document.getElementById('tab3').classList.add('active');
        
        document.getElementById('accTitle').innerText = fullName;
        document.getElementById('status').innerText = "Loading " + fullName + "...";
        fetchHistory();
    }

    async function fetchHistory() {
        try {
            const response = await fetch(`${scriptURL}?acc=${currentAcc}`);
            const data = await response.json();
            renderData(data);
        } catch (err) { document.getElementById('status').innerText = "Error loading data!"; }
    }

    function renderData(data) {
        const log = document.getElementById('historyLog');
        let total = 0, html = "";

        data.slice().reverse().forEach(item => {
            const isIN = item.type === 'IN';
            total += isIN ? item.amount : -item.amount;
            const dt = new Date(item.date);
            const dtStr = dt.toLocaleDateString('en-IN') + " | " + dt.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});

            html += `
                <div class="entry-item">
                    <div>
                        <span class="remark">${item.remark}</span><br>
                        <span class="date-time">📅 ${dtStr}</span>
                        <div class="actions">
                            <span style="color:#1a73e8; cursor:pointer;" onclick="startEdit(${item.row},'${item.remark}',${item.amount})">Edit</span>
                            <span style="color:red; cursor:pointer; margin-left:10px;" onclick="deleteEntry(${item.row})">Delete</span>
                        </div>
                    </div>
                    <div class="${isIN ? 'amt-in' : 'amt-out'}">${isIN ? '+' : '-'} ₹${item.amount}</div>
                </div>`;
        });
        document.getElementById('totalDisplay').innerText = total.toLocaleString('en-IN');
        log.innerHTML = html || "<p style='text-align:center; font-size:12px; color:#999;'>No entries yet.</p>";
        document.getElementById('status').innerText = "Account: " + currentAcc;
    }

    async function saveData(type) {
        const payload = { acc: currentAcc, amount: document.getElementById('amt').value, remark: document.getElementById('note').value, type: type };
        document.getElementById('status').innerText = "Saving...";
        await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        resetForm();
    }

    async function deleteEntry(row) {
        if(!confirm("Delete?")) return;
        await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action:"delete", row:row, acc:currentAcc}) });
        fetchHistory();
    }

    function startEdit(row, note, amt) {
        document.getElementById('editRow').value = row;
        document.getElementById('amt').value = amt;
        document.getElementById('note').value = note;
        document.getElementById('normalButtons').style.display = "none";
        document.getElementById('updateBtn').style.display = "block";
        window.scrollTo(0,0);
    }

    async function updateData() {
        const payload = { action:"update", acc:currentAcc, row:document.getElementById('editRow').value, amount:document.getElementById('amt').value, remark:document.getElementById('note').value };
        await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        resetForm();
    }

    function resetForm() {
        document.getElementById('amt').value = ""; document.getElementById('note').value = "";
        document.getElementById('normalButtons').style.display = "flex";
        document.getElementById('updateBtn').style.display = "none";
        fetchHistory();
    }

    fetchHistory();
</script>
</body>
</html>
